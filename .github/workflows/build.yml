name: Build-Infinix-OpenCL-Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_HOME}/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            .

      - name: Compile Library
        run: cmake --build build --config Release --parallel $(nproc)

      - name: Archive Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libunisoc_compute_release
          path: build/libunisoc_compute.so
