name: Android-OpenCL-Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"

      - name: Build with CMake (NDK)
        run: |
          mkdir build && cd build
          ${ANDROID_HOME}/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-29 \
          -DANDROID_NDK=${ANDROID_HOME}/ndk/25.2.9519653 \
          -DCMAKE_TOOLCHAIN_FILE=${ANDROID_HOME}/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
          ..
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libunisoc_compute.so
          path: build/libunisoc_compute.so
